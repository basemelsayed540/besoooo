                <button onclick="toggleNotifications()" class="icon-btn notif-btn" title="الإشعارات">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge" id="notifBadge" style="display:none">0</span>
                </button>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-empty" id="notifEmpty">لا توجد إشعارات</div>
                    <div id="notifList"></div>
                </div>
            </div>
            <button onclick="toggleTheme()" class="icon-btn" title="الوضع الليلي">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
            <div style="position:relative">
                <button onclick="toggleMenu()" class="icon-btn" title="القائمة">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="menu-panel" id="menuPanel">
                    <div class="menu-item" onclick="toggleMenu();showEditAccount()">
                        <i class="fas fa-user-edit"></i> تعديل الحساب
                    </div>
                    <div class="menu-divider"></div>
                    <div class="menu-item logout-item" onclick="toggleMenu();logout()">
                        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-4 gap-2 mb-4" id="statsRow">
        <div class="stat-card text-center">
            <div class="num text-indigo-600 dark:text-indigo-400" id="statTotal">0</div>
            <div class="label">المدفوع</div>
        </div>
        <div class="stat-card text-center">
            <div class="num text-emerald-600 dark:text-emerald-400" id="statCommission">0</div>
            <div class="label">العمولة</div>
            <div class="text-xs font-medium opacity-70 mt-1" id="statTotalCount"></div>
        </div>
        <div class="stat-card text-center">
            <div class="num text-amber-600 dark:text-amber-400" id="statDelivery">0</div>
            <div class="label">التوريد</div>
            <div id="statDeliveryBreakdown" class="text-[0.6rem] font-medium opacity-70 mt-1 leading-tight"></div>
        </div>
        <div class="stat-card text-center">
            <div class="num text-rose-600 dark:text-rose-400" id="statShipments">0</div>
            <div class="label">الشحنات</div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="glass p-3 mb-3">
        <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-bold text-slate-600 dark:text-slate-300">نسبة الإنجاز</span>
                    <span class="text-sm font-extrabold text-indigo-600 dark:text-indigo-400" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-custom">
            <div class="fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="flex justify-between mt-1.5 text-xs font-semibold text-slate-400">
            <span>تم <span id="progressDelivered">0</span></span>
            <span>متبقي <span id="progressRemaining">0</span></span>
        </div>
    </div>

    <!-- Search + Filters (Sticky) -->
    <div class="sticky top-0 z-20 pt-2 pb-1" style="background:inherit;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">
        <div class="flex gap-1.5 items-center mb-1.5">
            <input type="text" id="searchInput" class="flex-1 p-3 rounded-xl border dark:border-slate-600 bg-white/90 text-base text-slate-800 dark:text-gray-100 placeholder-slate-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-all" placeholder="🔍 بحث بكود الشحنة / العميل / الهاتف / هاتف بديل" oninput="onFilterChange()">
            <button id="toggleActionsBtn" class="shipment-eye-btn" onclick="toggleRepActions()" title="إخفاء/إظهار الأزرار"><i class="fas fa-eye-slash"></i></button>
        </div>
        <div class="filter-row grid grid-cols-4 gap-2">
            <select id="filterDaily" style="display:none" onchange="onFilterChange()"><option value="">اليومية</option></select>
            <select id="filterStatus" style="display:none" onchange="onFilterChange()"><option value="">الحالة</option></select>
            <select id="filterZone" style="display:none" onchange="onFilterChange()"><option value="">الزون</option></select>
            <select id="filterSender" style="display:none" onchange="onFilterChange()"><option value="">الراسل</option></select>
            <button class="filter-chip" id="chipDaily" data-placeholder="📅 اليومية" onclick="openFilterChip('daily')">📅 اليومية</button>
            <button class="filter-chip" id="chipStatus" data-placeholder="📋 الحالة" onclick="openFilterChip('status')">📋 الحالة</button>
            <button class="filter-chip" id="chipZone" data-placeholder="📍 الزون" onclick="openFilterChip('zone')">📍 الزون</button>
            <button class="filter-chip" id="chipSender" data-placeholder="🏢 الراسل" onclick="openFilterChip('sender')">🏢 الراسل</button>
        </div>
    </div>

    <!-- Shipments List -->
    <div id="shipmentsContainer">
        <div class="empty-state"><i class="fas fa-box-open text-4xl mb-3 opacity-50"></i><p class="font-bold">اختر اليومية لعرض الشحنات</p></div>
    </div>
</div>

<script src="assets/js/shipment-config.js"></script>
<script>
    const BUILD = '6'; if (!window.location.href.includes('_t=')) { localStorage.setItem('rep-version', BUILD); window.location.href = window.location.href.split('?')[0] + '?_t=' + BUILD; }
    const supabaseClient = getSharedSupabaseClient();
    let actionsHidden = localStorage.getItem('rep-actions-hidden') === 'true';
    function toggleRepActions() {
        actionsHidden = !actionsHidden;
        localStorage.setItem('rep-actions-hidden', actionsHidden ? 'true' : 'false');
        document.querySelectorAll('.action-btns').forEach(el => el.classList.toggle('hidden-actions', actionsHidden));
        const btn = document.getElementById('toggleActionsBtn');
        if (btn) btn.innerHTML = '<i class="fas ' + (actionsHidden ? 'fa-eye' : 'fa-eye-slash') + '"></i>';
    }
    let currentUser = JSON.parse(localStorage.getItem('user'));
    let allShipments = [];
    let filteredShipments = [];

    function enNum(s) {
        return String(s).replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
    }

    let notifications = [];
    let notifSnapshot = {};
    let filterData = { daily: [], status: [], zone: [], sender: [] };
    let filterCounts = { daily: {}, status: {}, zone: {}, sender: {} };

    function saveSnapshot() {
        const snap = {};
        allShipments.forEach(s => { snap[s.id] = s['الحالة'] || ''; });
        notifSnapshot = snap;
        localStorage.setItem('repNotifSnapshot', JSON.stringify(snap));
    }

    function loadSnapshot() {
        try { notifSnapshot = JSON.parse(localStorage.getItem('repNotifSnapshot')) || {}; } catch (e) { notifSnapshot = {}; }
    }

    function getFavorites() {
        try { return JSON.parse(localStorage.getItem('repFavorites')) || {}; } catch (e) { return {}; }
    }
    function saveFavorites(fav) { localStorage.setItem('repFavorites', JSON.stringify(fav)); }
    function isFavorite(id) { return !!getFavorites()[id]; }
    function toggleFavorite(id) {
        const fav = getFavorites();
        if (fav[id]) { delete fav[id]; } else { fav[id] = Date.now(); }
        saveFavorites(fav);
        applyFilters();
    }
    function removeFavorite(id) {
        const fav = getFavorites();
        if (fav[id]) { delete fav[id]; saveFavorites(fav); }
    }

    function getFollowupsSent() {
        try { return JSON.parse(localStorage.getItem('repFollowupsSent')) || {}; } catch (e) { return {}; }
    }
    function saveFollowupsSent(obj) { localStorage.setItem('repFollowupsSent', JSON.stringify(obj)); }
    function markFollowupSent(id) { const o = getFollowupsSent(); o[id] = true; saveFollowupsSent(o); }

    function getFollowupsDismissed() {
        try { return JSON.parse(localStorage.getItem('repFollowupsDismissed')) || {}; } catch (e) { return {}; }
    }
    function saveFollowupsDismissed(obj) { localStorage.setItem('repFollowupsDismissed', JSON.stringify(obj)); }
    function markFollowupDismissed(id) { const o = getFollowupsDismissed(); o[id] = true; saveFollowupsDismissed(o); }

    function checkNotifications(isInitial) {
        if (!allShipments.length) return;
        const oldIds = new Set(Object.keys(notifSnapshot));
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        allShipments.forEach(s => {
            const id = String(s.id);
            const oldStatus = notifSnapshot[id] || '';
            const newStatus = s['الحالة'] || '';
            if (oldStatus && oldStatus !== newStatus) {
                const customer = s['اسم العميل'] || s['كود الشحنة'] || id;
                notifications.unshift({ title: `تحديث حالة: ${customer}`, desc: `${oldStatus} ← ${newStatus} • ${timeStr}`, time: timeStr });
            } else if (!isInitial && !oldStatus && newStatus) {
                const customer = s['اسم العميل'] || s['كود الشحنة'] || id;
                notifications.unshift({ title: `شحنة جديدة: ${customer}`, desc: `الحالة: ${newStatus} • ${timeStr}`, time: timeStr });
            }
        });
        if (notifications.length > 50) notifications = notifications.slice(0, 50);
        saveSnapshot();
        renderNotifications();
    }

    function renderNotifications() {
        const badge = document.getElementById('notifBadge');
        const list = document.getElementById('notifList');
        const empty = document.getElementById('notifEmpty');
        if (notifications.length) {
            badge.style.display = 'flex';
            badge.textContent = notifications.length > 99 ? '99+' : notifications.length;
            empty.style.display = 'none';
            list.innerHTML = notifications.map(n => `<div class="notif-item"><div class="notif-title">${n.title}</div><div class="notif-desc">${n.desc}</div></div>`).join('');
        } else {
            badge.style.display = 'none';
            empty.style.display = 'block';
            list.innerHTML = '';
        }
    }

    let notifOpen = false;
    function toggleNotifications() {
        notifOpen = !notifOpen;
        document.getElementById('notifPanel').classList.toggle('show', notifOpen);
    }
    document.addEventListener('click', (e) => {
        if (notifOpen && !e.target.closest('#notifPanel') && !e.target.closest('.notif-btn')) {
            notifOpen = false;
            document.getElementById('notifPanel').classList.remove('show');
        }
    });

    if (!currentUser || !['rep', 'مندوب فرعي', 'admin', 'housing'].includes(currentUser.role)) {
        window.location.href = 'login.html';
    }

    const repDisplayName = currentUser.full_name || currentUser.username || '';
    document.getElementById('repName').textContent = repDisplayName;

    if (localStorage.getItem('rep-theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeIcon').className = 'fas fa-sun';
    }

    function toggleTheme() {
        document.body.classList.add('no-transitions');
        const isDark = document.body.classList.toggle('dark');
        document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('rep-theme', isDark ? 'dark' : 'light');
        requestAnimationFrame(() => document.body.classList.remove('no-transitions'));
    }

    function logout() {
        clearStoredUserSession('login.html');
    }

    let menuOpen = false;
    function toggleMenu() {
        menuOpen = !menuOpen;
        document.getElementById('menuPanel').classList.toggle('show', menuOpen);
    }
    document.addEventListener('click', (e) => {
        if (menuOpen && !e.target.closest('#menuPanel') && !e.target.closest('.fa-bars') && !e.target.closest('[onclick*="toggleMenu"]')) {
            menuOpen = false;
            document.getElementById('menuPanel').classList.remove('show');
        }
    });

    function showEditAccount() {
        const user = currentUser;
        const isDark = document.body.classList.contains('dark');
        Swal.fire({
            title: 'تعديل الحساب',
            background: isDark ? '#0f172a' : '#fff',
            color: isDark ? '#f8fafc' : '#0f172a',
            html: `
                <div class="text-right">
                    <label class="text-sm font-bold ${isDark ? 'text-slate-300' : 'text-slate-600'}">الاسم</label>
                    <input type="text" id="editName" readonly class="w-full p-2.5 rounded-xl border ${isDark ? 'border-slate-600 bg-slate-800 text-white' : 'border-slate-300 bg-white'} text-sm mt-1 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400 opacity-75" value="${user.full_name || user.username || ''}">
                    <label class="text-sm font-bold ${isDark ? 'text-slate-300' : 'text-slate-600'}">رقم الهاتف</label>
                    <input type="text" id="editPhone" class="w-full p-2.5 rounded-xl border ${isDark ? 'border-slate-600 bg-slate-800 text-white' : 'border-slate-300 bg-white'} text-sm mt-1 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" value="${user.phone || ''}">
                    <label class="text-sm font-bold ${isDark ? 'text-slate-300' : 'text-slate-600'}">كلمة المرور الجديدة (اترك فارغاً إذا لا تريد التغيير)</label>
                    <input type="password" id="editPass" class="w-full p-2.5 rounded-xl border ${isDark ? 'border-slate-600 bg-slate-800 text-white' : 'border-slate-300 bg-white'} text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="أدخل كلمة المرور الجديدة">
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'حفظ',
            cancelButtonText: 'الغاء',
            confirmButtonColor: '#6366f1',
            customClass: {
                popup: isDark ? 'swal-dark' : '',
                title: isDark ? 'swal-title-dark' : ''
            },
            preConfirm: () => {
                const name = document.getElementById('editName').value.trim();
                const phone = document.getElementById('editPhone').value.trim();
                const pass = document.getElementById('editPass').value;
                if (!name) { Swal.showValidationMessage('يرجى إدخال الاسم'); return false; }
                if (!phone) { Swal.showValidationMessage('يرجى إدخال رقم الهاتف'); return false; }
                return { name, phone, pass };
            }
        }).then(async (result) => {
            if (!result.isConfirmed) return;
            const { name, phone, pass } = result.value;
            try {
                const updates = { full_name: name, phone: phone };
                if (pass) updates.password = pass;
                const { error } = await supabaseClient
                    .from('users')
                    .update(updates)
                    .eq('id', user.id);
                if (error) throw error;
                if (pass) {
                    const { error: authError } = await supabaseClient.auth.updateUser({ password: pass });
                    if (authError) throw authError;
                }
                Object.assign(currentUser, { full_name: name, username: phone });
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('repName').textContent = name;
                Swal.fire({ icon: 'success', title: 'تم تحديث الحساب', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            } catch (err) {
                Swal.fire('خطأ', err.message, 'error');
            }
        });
    }

    async function loadShipments() {
        try {
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .eq('المندوب', repDisplayName)
                .order('كود الشحنة', { ascending: false });

            if (error) throw error;
            allShipments = data || [];
            loadSnapshot();
            checkNotifications(true);
            populateFilters();
            restoreFilters();
            if (document.getElementById('filterDaily').value) {
                applyFilters();
                restoreScroll();
            }
        } catch (err) {
            console.error(err);
            Swal.fire('خطأ', 'فشل تحميل الشحنات', 'error');
        }
    }

    function populateFilters() {
        const dailySel = document.getElementById('filterDaily').value;
        const base = dailySel ? allShipments.filter(s => (s['اليومية'] || '') === dailySel) : allShipments;

        const dailies = [...new Set(allShipments.map(s => s['اليومية'] || '').filter(Boolean))].sort();
        const statuses = [...new Set(allShipments.map(s => s['الحالة'] || '').filter(Boolean))].sort();
        statuses.unshift('المفضلة');
        statuses.push('بحاجة لمتابعة');
        const zones = [...new Set(allShipments.map(s => s['الزون'] || '').filter(Boolean))].sort();
        const senders = [...new Set(allShipments.map(s => s['الراسل'] || '').filter(Boolean))].sort();

        const dailyCounts = {};
        allShipments.forEach(s => { const k = s['اليومية'] || ''; if (k) dailyCounts[k] = (dailyCounts[k] || 0) + 1; });

        const statusCounts = {};
        const zoneCounts = {};
        const senderCounts = {};
        base.forEach(s => {
            const st = s['الحالة'] || '';
            if (st) statusCounts[st] = (statusCounts[st] || 0) + 1;
            const zn = s['الزون'] || '';
            if (zn) zoneCounts[zn] = (zoneCounts[zn] || 0) + 1;
            const sr = s['الراسل'] || '';
            if (sr) senderCounts[sr] = (senderCounts[sr] || 0) + 1;
        });
        statusCounts['المفضلة'] = Object.keys(getFavorites()).length;
        const followupStatuses = ['الغاء', 'مؤجل', 'تعديل سعر', 'شحن'];
        const dismissed = getFollowupsDismissed();
        statusCounts['بحاجة لمتابعة'] = base.filter(s => followupStatuses.includes(s['الحالة'] || '') && !dismissed[String(s.id)]).length;

        setOptions('filterDaily', dailies, dailyCounts);
        setOptions('filterStatus', statuses, statusCounts);
        setOptions('filterZone', zones, zoneCounts);
        setOptions('filterSender', senders, senderCounts);
        filterData = { daily: dailies, status: statuses, zone: zones, sender: senders };
        filterCounts = { daily: dailyCounts, status: statusCounts, zone: zoneCounts, sender: senderCounts };
        updateChips();
    }
    function updateChips() {
        ['daily','status','zone','sender'].forEach(t => {
            const sel = document.getElementById('filter' + t.charAt(0).toUpperCase() + t.slice(1));
            const chip = document.getElementById('chip' + t.charAt(0).toUpperCase() + t.slice(1));
            const val = sel.value;
            chip.textContent = val ? val : chip.dataset.placeholder;
            chip.classList.toggle('active', !!val);
        });
    }

    function openFilterChip(type) {
        const items = filterData[type] || [];
        const counts = filterCounts[type] || {};
        const sel = document.getElementById('filter' + type.charAt(0).toUpperCase() + type.slice(1));
        const current = sel.value;
        const labels = ['اليومية', 'الحالة', 'الزون', 'الراسل'];
        const icons = ['📅', '📋', '📍', '🏢'];
        const ti = { daily: 0, status: 1, zone: 2, sender: 3 };
        const title = icons[ti[type]] + ' ' + labels[ti[type]];
        const chipColors = ['popup-opt-ivy', 'popup-opt-herb', 'popup-opt-sun', 'popup-opt-air'];
        const activeColors = ['popup-opt-ivy active', 'popup-opt-herb active', 'popup-opt-sun active', 'popup-opt-air active'];
        const ci = ti[type];
        const archivedDailies = new Set(allShipments.filter(s => (s['ارشيف'] || '').trim()).map(s => s['اليومية'] || '').filter(Boolean));
        const optsHtml = ['<div class="grid grid-cols-1 gap-1.5">',
            `<div data-type="${type}" data-value="" onclick="selectFilterChip(this)" class="p-2.5 rounded-xl border-2 cursor-pointer text-center font-bold text-sm ${!current ? activeColors[ci] : chipColors[ci]}">الكل (${items.length})</div>`,
            ...items.map(v => `<div data-type="${type}" data-value="${v.replace(/"/g,'&quot;')}" onclick="selectFilterChip(this)" class="p-2.5 rounded-xl border-2 cursor-pointer text-center font-bold text-sm ${current === v ? activeColors[ci] : chipColors[ci]}">${v}${type === 'daily' && archivedDailies.has(v) ? ' 📦' : ''} (${counts[v] || 0})</div>`),
        '</div>'].join('');
        Swal.fire({ title, html: optsHtml, showCancelButton: true, cancelButtonText: 'الغاء', showConfirmButton: false });
    }
    window.selectFilterChip = function(el) {
        const type = el.dataset.type;
        const value = el.dataset.value;
        const id = 'filter' + type.charAt(0).toUpperCase() + type.slice(1);
        document.getElementById(id).value = value;
        if (Swal.isVisible()) Swal.close();
        updateChips();
        onFilterChange();
    };
    function setOptions(id, items, counts) {
        const sel = document.getElementById(id);
        const current = sel.value;
        sel.innerHTML = '<option value="">' + sel.options[0].text + '</option>';
        items.forEach(v => {
            const o = document.createElement('option');
            o.value = v;
            const c = counts && counts[v] ? counts[v] : 0;
            o.textContent = v + ' (' + c + ')';
            sel.appendChild(o);
        });
        sel.value = current;
    }

    function saveFilters() {
        const filters = {
            daily: document.getElementById('filterDaily').value,
            status: document.getElementById('filterStatus').value,
            zone: document.getElementById('filterZone').value,
            sender: document.getElementById('filterSender').value,
            search: document.getElementById('searchInput').value
        };
        localStorage.setItem('repFilters', JSON.stringify(filters));
    }

    function restoreFilters() {
        try {
            const saved = JSON.parse(localStorage.getItem('repFilters'));
            if (!saved) return;
            document.getElementById('filterDaily').value = saved.daily || '';
            document.getElementById('filterStatus').value = saved.status || '';
            document.getElementById('filterZone').value = saved.zone || '';
            document.getElementById('filterSender').value = saved.sender || '';
            document.getElementById('searchInput').value = saved.search || '';
        } catch (e) {}
    }

    function restoreScroll() {
        const saved = localStorage.getItem('repScrollPos');
        if (saved) setTimeout(() => window.scrollTo(0, parseInt(saved)), 100);
        localStorage.removeItem('repScrollPos');
    }

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('repScrollPos', String(window.scrollY));
    });

    function onFilterChange() {
        saveFilters();
        const daily = document.getElementById('filterDaily').value;
        if (!daily) {
            document.getElementById('shipmentsContainer').innerHTML = '<div class="empty-state"><i class="fas fa-box-open text-4xl mb-3 opacity-50"></i><p class="font-bold">اختر اليومية لعرض الشحنات</p></div>';
            resetStats();
            return;
        }
        applyFilters();
    }

    function getDailyShipments() {
        const daily = document.getElementById('filterDaily').value;
        if (!daily) return [];
        return allShipments.filter(s => (s['اليومية'] || '') === daily);
    }

    function applyFilters() {
        saveFilters();
        const daily = document.getElementById('filterDaily').value;
        if (!daily) return;
        populateFilters();
        const status = document.getElementById('filterStatus').value;
        const zone = document.getElementById('filterZone').value;
        const sender = document.getElementById('filterSender').value;
        const searchTerm = document.getElementById('searchInput').value.trim();

        filteredShipments = getDailyShipments().filter(s => {
            const sid = String(s.id);
            const sStatus = s['الحالة'] || '';
            if (status === 'المفضلة') {
                const fav = getFavorites();
                if (!fav[sid]) return false;
            } else if (status === 'بحاجة لمتابعة') {
                const followupStatuses = ['الغاء', 'مؤجل', 'تعديل سعر', 'شحن'];
                if (!followupStatuses.includes(sStatus)) return false;
                const dismissed = getFollowupsDismissed();
                if (dismissed[sid]) return false;
            } else {
                const fav = getFavorites();
                const isFav = !!fav[sid];
                if (isFav) return false;
                if (status && sStatus !== status) return false;
            }
            if (zone && (s['الزون'] || '') !== zone) return false;
            if (sender && (s['الراسل'] || '') !== sender) return false;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                const match = (s['كود الشحنة'] || '').toLowerCase().includes(term)
                    || (s['العميل'] || '').toLowerCase().includes(term)
                    || (s['الهاتف'] || '').toLowerCase().includes(term)
                    || (s['هاتف بديل'] || '').toLowerCase().includes(term);
                if (!match) return false;
            }
            return true;
        });

        if (status === 'المفضلة') {
            const fav = getFavorites();
            filteredShipments.sort((a, b) => (fav[String(a.id)] || 0) - (fav[String(b.id)] || 0));
        }

        updateStats();
        renderShipments();
    }

    function resetStats() {
        document.getElementById('statTotal').textContent = enNum('0');
        document.getElementById('statTotalCount').textContent = '';
        document.getElementById('statCommission').textContent = enNum('0');
        document.getElementById('statDelivery').textContent = enNum('0');
        document.getElementById('statDeliveryBreakdown').textContent = '';
        document.getElementById('statShipments').textContent = enNum('0');
        document.getElementById('progressPercent').textContent = enNum('0') + '%';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressDelivered').textContent = '0';
        document.getElementById('progressRemaining').textContent = '0';
    }

    function updateStats() {
        const dailyShipments = getDailyShipments();
        const doneStatuses = ['تم', 'تم التسليم', 'شحن', 'تعديل سعر', 'استلم جزئي'];
        const doneShipments = dailyShipments.filter(s => doneStatuses.includes(s['الحالة'] || ''));
        const total = doneShipments.reduce((sum, s) => sum + (parseFloat(s['المدفوع']) || 0), 0);
        const commission = doneShipments.reduce((sum, s) => sum + (parseFloat(s['عمولة المندوب']) || 0), 0);
        const delivered = doneShipments.length;
        const deliveryTotal = total - commission;

        document.getElementById('statTotal').textContent = enNum(Math.round(total));
        document.getElementById('statTotalCount').textContent = enNum(doneShipments.length) + ' شحنة';
        document.getElementById('statCommission').textContent = enNum(Math.round(commission));
        document.getElementById('statDelivery').textContent = enNum(Math.round(deliveryTotal));
        document.getElementById('statShipments').textContent = enNum(dailyShipments.length);

        const statusBreakdown = { 'تعديل سعر': 0, 'شحن': 0, 'مؤجل': 0, 'الغاء': 0, 'قيد التوصيل': 0 };
        dailyShipments.forEach(s => {
            const st = s['الحالة'] || '';
            if (statusBreakdown.hasOwnProperty(st)) statusBreakdown[st]++;
        });
        document.getElementById('statDeliveryBreakdown').textContent =
            Object.entries(statusBreakdown).filter(([, c]) => c > 0).map(([k, c]) => `${k}:${c}`).join(' | ');

        const pct = dailyShipments.length ? Math.round((delivered / dailyShipments.length) * 100) : 0;
        document.getElementById('progressPercent').textContent = enNum(pct) + '%';
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressDelivered').textContent = enNum(delivered);
        document.getElementById('progressRemaining').textContent = enNum(dailyShipments.length - delivered);
    }

    async function updateShipmentStatus(idx, status) {
        const shipment = filteredShipments[idx];
        if (!shipment) return Swal.fire('خطأ', 'لم يتم العثور على الشحنة', 'error');
        if ((shipment['ارشيف'] || '').trim()) return Swal.fire('غير مسموح', 'لا يمكن تعديل شحنة مؤرشفة', 'warning');
        try {
            const payload = { الحالة: status };
            if (status === 'تم') {
                payload['المدفوع'] = shipment['المبلغ'] || '0';
            }
            const { error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .update(payload)
                .eq('id', shipment.id);
            if (error) throw error;
            Object.assign(shipment, payload);
            removeFavorite(String(shipment.id));
            applyFilters();
            Swal.fire({ icon: 'success', title: 'تم تحديث الحالة', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        } catch (err) {
            Swal.fire('خطأ', err.message, 'error');
        }
    }

        if (digits.startsWith('20')) return '+' + digits;
        if (digits.startsWith('0')) return '+20' + digits.slice(1);
        return '+20' + digits;
    }

            'المنطقه خارج نطاق التوصيل','العنوان غير صحيح',
            'المنتج غير مطابق','المنتج تالف',
            'تهرب بعد التنسيق','رقم الموبيل او الواتساب غير صحيح'
        ];
        const rejectColors = [
            'popup-opt-blush','popup-opt-peach','popup-opt-sun','popup-opt-air',
            'popup-opt-lavender','popup-opt-petal','popup-opt-mist','popup-opt-gold'
        ];
        Swal.fire({
            title: 'اختر سبب الرفض',
            html: `
                <div class="grid grid-cols-1 gap-1.5">
                    ${opts.map((o, i) => `
                        <div class="p-2.5 rounded-xl border-2 cursor-pointer text-center font-bold text-sm ${rejectColors[i]}" onclick="Swal.close();doUpdateShipment(${idx},{'الحالة':'الغاء','سبب الحالة':'${o}'})">
                            ❌ ${o}
                        </div>`).join('')}
                </div>
            `,
            showCancelButton: true,
            cancelButtonText: 'الغاء',
            showConfirmButton: false
        });
    }

    setInterval(async () => {
        const { data } = await supabaseClient
            .from(CONFIG.TABLES.SHIPMENTS)
            .select('id,الحالة,اسم العميل,كود الشحنة')
            .eq('المندوب', repDisplayName);
        if (data) {
            const oldShipments = allShipments;
            allShipments = data;
            checkNotifications(false);
            allShipments = oldShipments;
        }
    }, 60000);

    // Init toggle button icon
    const toggleBtn = document.getElementById('toggleActionsBtn');
    if (toggleBtn) toggleBtn.innerHTML = '<i class="fas ' + (actionsHidden ? 'fa-eye' : 'fa-eye-slash') + '"></i>';

    loadShipments();
</script>
</body>
</html>
