<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>إعدادات المطور | Light Shipping</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/js/shipment-config.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; transition: background .3s, color .3s; }
        body.light { background: #f1f5f9; color: #1e293b; }
        .glass { background: rgba(30,41,59,.85); backdrop-filter: blur(16px); border: 1px solid rgba(148,163,184,.1); border-radius: 1rem; }
        body.light .glass { background: rgba(255,255,255,.9); border-color: rgba(0,0,0,.08); }
        .input-field { width: 100%; padding: .75rem 1rem; border-radius: .75rem; border: 2px solid rgba(148,163,184,.2); background: rgba(15,23,42,.6); color: #e2e8f0; font-family: 'Cairo', sans-serif; font-size: .95rem; transition: border .2s; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        body.light .input-field { background: #fff; color: #1e293b; border-color: #cbd5e1; }
        body.light .input-field:focus { border-color: #3b82f6; }
        .btn { padding: .6rem 1.5rem; border-radius: .75rem; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; border: none; transition: all .2s; }
        .btn-primary { background: linear-gradient(135deg,#3b82f6,#2563eb); color: #fff; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,.3); }
        .btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; }
        .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(239,68,68,.3); }
        .btn-success { background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; }
        .btn-success:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(34,197,94,.3); }
        .btn-outline { background: transparent; border: 2px solid rgba(148,163,184,.3); color: #94a3b8; }
        .btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }
        label { display: block; font-weight: 600; margin-bottom: .35rem; font-size: .9rem; color: #94a3b8; }
        body.light label { color: #64748b; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid rgba(148,163,184,.15); display: flex; align-items: center; gap: .5rem; }
        pre.sql-block { background: #1e293b; color: #a5b4fc; padding: 1rem; border-radius: .75rem; overflow-x: auto; font-size: .8rem; line-height: 1.6; direction: ltr; text-align: left; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; border: 1px solid rgba(148,163,184,.15); font-family: 'Courier New', monospace; }
        body.light pre.sql-block { background: #f8fafc; color: #2563eb; }
        .copy-btn { position: absolute; top: .5rem; left: .5rem; background: rgba(59,130,246,.2); border: none; color: #3b82f6; padding: .3rem .7rem; border-radius: .5rem; cursor: pointer; font-size: .75rem; font-family: 'Cairo', sans-serif; transition: all .2s; }
        .copy-btn:hover { background: rgba(59,130,246,.4); }
        .sql-wrapper { position: relative; margin-top: .5rem; }
        .badge { display: inline-flex; align-items: center; gap: .3rem; padding: .15rem .65rem; border-radius: 999px; font-size: .75rem; font-weight: 700; }
        .badge-blue { background: rgba(59,130,246,.2); color: #60a5fa; }
        .badge-green { background: rgba(34,197,94,.2); color: #4ade80; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 1rem; font-weight: 700; z-index: 9999; animation: slideUp .3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; margin-bottom: 2rem; }
        .nav-title { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: .5rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.3); border-radius: 3px; }
        @media (max-width: 640px) { .container { padding: 0 1rem; } .nav-bar { padding: .75rem 1rem; } }
    </style>
</head>
<body class="dark">

<div class="nav-bar glass" style="margin:1rem;border-radius:1rem">
    <div class="nav-title"><i class="fas fa-code text-blue-400"></i> إعدادات المطور</div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <button onclick="toggleTheme()" class="btn btn-outline" style="padding:.4rem 1rem"><i class="fas fa-moon" id="themeIcon"></i></button>
        <button onclick="runSqlQuery()" class="btn btn-success" style="padding:.4rem 1rem"><i class="fas fa-play"></i> تشغيل SQL</button>
        <button onclick="downloadSql()" class="btn btn-primary" style="padding:.4rem 1rem"><i class="fas fa-download"></i> تحميل SQL</button>
        <button onclick="devLogout()" class="btn btn-danger" style="padding:.4rem 1rem"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
</div>

<div class="container" style="max-width:1200px;margin:0 auto;padding:0 1rem 3rem">

    <!-- Supabase Config -->
    <div class="glass" style="padding:1.5rem;margin-bottom:1.5rem">
        <div class="section-title"><i class="fas fa-database text-blue-400"></i> إعدادات Supabase</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">
            <div>
                <label><i class="fas fa-link text-blue-400" style="margin-left:.3rem"></i> SUPABASE_URL</label>
                <input type="text" id="supabaseUrl" class="input-field" placeholder="https://xxx.supabase.co">
            </div>
            <div>
                <label><i class="fas fa-key text-yellow-400" style="margin-left:.3rem"></i> SUPABASE_KEY</label>
                <input type="password" id="supabaseKey" class="input-field" placeholder="anon key">
                <button onclick="toggleKey()" class="btn btn-outline" style="margin-top:.4rem;padding:.2rem .8rem;font-size:.8rem"><i class="fas fa-eye"></i> إظهار/إخفاء</button>
            </div>
            <div>
                <label><i class="fas fa-table text-green-400" style="margin-left:.3rem"></i> جدول الشحنات (SHIPMENTS)</label>
                <input type="text" id="tableShipments" class="input-field" placeholder="abdo">
            </div>
            <div>
                <label><i class="fas fa-users text-green-400" style="margin-left:.3rem"></i> جدول المستخدمين (USERS)</label>
                <input type="text" id="tableUsers" class="input-field" placeholder="users">
            </div>
        </div>
        <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
            <button onclick="saveSupabaseConfig()" class="btn btn-success"><i class="fas fa-save"></i> حفظ الإعدادات</button>
            <button onclick="resetSupabaseConfig()" class="btn btn-danger"><i class="fas fa-undo"></i> استعادة الإعدادات الافتراضية</button>
            <button onclick="testConnection()" class="btn btn-primary"><i class="fas fa-plug"></i> اختبار الاتصال</button>
        </div>
        <div id="connStatus" style="margin-top:.75rem;font-size:.9rem;font-weight:600"></div>
    </div>

    <!-- Dev Credentials -->
    <div class="glass" style="padding:1.5rem;margin-bottom:1.5rem">
        <div class="section-title"><i class="fas fa-user-secret text-purple-400"></i> بيانات دخول المطور</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">
            <div>
                <label><i class="fas fa-phone text-purple-400" style="margin-left:.3rem"></i> رقم المطور</label>
                <input type="text" id="devPhone" class="input-field" placeholder="رقم المطور">
            </div>
            <div>
                <label><i class="fas fa-lock text-purple-400" style="margin-left:.3rem"></i> كلمة مرور المطور</label>
                <input type="password" id="devPass" class="input-field" placeholder="كلمة المرور">
            </div>
        </div>
        <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
            <button onclick="saveDevCredentials()" class="btn btn-success"><i class="fas fa-save"></i> حفظ بيانات المطور</button>
            <button onclick="resetDevCredentials()" class="btn btn-danger"><i class="fas fa-undo"></i> استعادة الافتراضية</button>
        </div>
    </div>

    <!-- SQL Query -->
    <div class="glass" style="padding:1.5rem;margin-bottom:1.5rem">
        <div class="section-title"><i class="fas fa-terminal text-emerald-400"></i> استعلام SQL &mdash; هيكل قاعدة البيانات</div>
        <p style="color:#94a3b8;font-size:.85rem;margin-bottom:.75rem">
            يعرض هذا الاستعلام هيكل الجداول المستخدمة في النظام. يمكنك نسخه أو تحميله كملف <code>.sql</code> لاستخدامه في Supabase SQL Editor.
        </p>
        <div class="sql-wrapper">
            <button class="copy-btn" onclick="copySql()"><i class="fas fa-copy"></i> نسخ</button>
            <pre class="sql-block" id="sqlBlock">-- جارٍ إنشاء الاستعلام...</pre>
        </div>
    </div>

    <!-- Result Display -->
    <div class="glass" style="padding:1.5rem">
        <div class="section-title"><i class="fas fa-list text-orange-400"></i> نتيجة الاستعلام</div>
        <div id="queryResult" style="font-size:.9rem;color:#94a3b8">قم بتشغيل الاستعلام لعرض النتائج.</div>
    </div>

</div>

<script>

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
        var icon = document.getElementById('themeIcon');
        var isLight = document.body.classList.contains('light');
        icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('dev-theme', isLight ? 'light' : 'dark');
    }

    if (localStorage.getItem('dev-theme') === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        document.getElementById('themeIcon').className = 'fas fa-sun';
    }

    function loadConfig() {
        try {
            var u = localStorage.getItem('dev_supabase_url');
            var k = localStorage.getItem('dev_supabase_key');
            document.getElementById('supabaseUrl').value = u ? _dec(u) : CONFIG.SUPABASE_URL;
            document.getElementById('supabaseKey').value = k ? _dec(k) : CONFIG.SUPABASE_KEY;
            var ts = localStorage.getItem('dev_table_shipments');
            var tu = localStorage.getItem('dev_table_users');
            document.getElementById('tableShipments').value = ts ? _dec(ts) : CONFIG.TABLES.SHIPMENTS;
            document.getElementById('tableUsers').value = tu ? _dec(tu) : CONFIG.TABLES.USERS;
        } catch(e) {
            document.getElementById('supabaseUrl').value = CONFIG.SUPABASE_URL;
            document.getElementById('supabaseKey').value = CONFIG.SUPABASE_KEY;
            document.getElementById('tableShipments').value = CONFIG.TABLES.SHIPMENTS;
            document.getElementById('tableUsers').value = CONFIG.TABLES.USERS;
        }
    }

    function loadDevCredentials() {
        try {
            var p = localStorage.getItem('dev_phone');
            var q = localStorage.getItem('dev_pass');
            document.getElementById('devPhone').value = p ? _dec(p) : DEV_PHONE;
            document.getElementById('devPass').value = q ? _dec(q) : DEV_PASS;
        } catch(e) {
            document.getElementById('devPhone').value = DEV_PHONE;
            document.getElementById('devPass').value = DEV_PASS;
        }
    }

    function generateSql() {
        var shipmentsTable = document.getElementById('tableShipments').value || CONFIG.TABLES.SHIPMENTS;
        var usersTable = document.getElementById('tableUsers').value || CONFIG.TABLES.USERS;
        var sql = `-- ============================================================\n`;
        sql += `-- Light Shipping System - Database Schema\n`;
        sql += `-- Generated: ${new Date().toLocaleString('ar-SA')}\n`;
        sql += `-- ============================================================\n\n`;
        sql += `-- 1. Users table\n`;
        sql += `CREATE TABLE IF NOT EXISTS public.${usersTable} (\n`;
        sql += `    id BIGSERIAL PRIMARY KEY,\n`;
        sql += `    username TEXT NOT NULL,\n`;
        sql += `    full_name TEXT,\n`;
        sql += `    phone TEXT UNIQUE NOT NULL,\n`;
        sql += `    email TEXT,\n`;
        sql += `    password TEXT NOT NULL,\n`;
        sql += `    role TEXT NOT NULL DEFAULT 'rep',\n`;
        sql += `    approved BOOLEAN DEFAULT false,\n`;
        sql += `    parent_id BIGINT REFERENCES public.${usersTable}(id),\n`;
        sql += `    created_at TIMESTAMPTZ DEFAULT now()\n`;
        sql += `);\n\n`;
        sql += `-- 2. Shipments table\n`;
        sql += `CREATE TABLE IF NOT EXISTS public.${shipmentsTable} (\n`;
        sql += `    m BIGSERIAL PRIMARY KEY,\n`;
        sql += `    "اسم العميل" TEXT,\n`;
        sql += `    "العنوان" TEXT,\n`;
        sql += `    "الزون" TEXT,\n`;
        sql += `    "المنتج" TEXT,\n`;
        sql += `    "الهاتف" TEXT,\n`;
        sql += `    "هاتف بديل" TEXT,\n`;
        sql += `    "المبلغ" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "الراسل" TEXT,\n`;
        sql += `    "كود الشحنة" TEXT,\n`;
        sql += `    "المندوب" TEXT,\n`;
        sql += `    "الحالة" TEXT,\n`;
        sql += `    "سبب الحالة" TEXT,\n`;
        sql += `    "المدفوع" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "ملاحظات" TEXT,\n`;
        sql += `    "التاريخ" TIMESTAMPTZ DEFAULT now(),\n`;
        sql += `    "الصافي" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "الشحن" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "عدد" INTEGER DEFAULT 1,\n`;
        sql += `    "تقفيل" BOOLEAN DEFAULT false,\n`;
        sql += `    "عمولة المندوب" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "عمولة المندوب الفرعي" NUMERIC(10,2) DEFAULT 0,\n`;
        sql += `    "الموظف" TEXT,\n`;
        sql += `    "نوع المندوب" TEXT,\n`;
        sql += `    "المندوب الفرعي" TEXT,\n`;
        sql += `    "حدث" TEXT,\n`;
        sql += `    "اليومية" BOOLEAN DEFAULT false,\n`;
        sql += `    "ارشيف" BOOLEAN DEFAULT false\n`;
        sql += `);\n\n`;
        sql += `-- 3. Settlements table\n`;
        sql += `CREATE TABLE IF NOT EXISTS public.${CONFIG.TABLES.SETTLEMENTS} (\n`;
        sql += `    id BIGSERIAL PRIMARY KEY,\n`;
        sql += `    rep_id BIGINT REFERENCES public.${usersTable}(id),\n`;
        sql += `    amount NUMERIC(10,2) NOT NULL,\n`;
        sql += `    date TIMESTAMPTZ DEFAULT now(),\n`;
        sql += `    notes TEXT\n`;
        sql += `);\n\n`;
        sql += `-- 4. Row Level Security\n`;
        sql += `ALTER TABLE public.${usersTable} ENABLE ROW LEVEL SECURITY;\n`;
        sql += `ALTER TABLE public.${shipmentsTable} ENABLE ROW LEVEL SECURITY;\n`;
        sql += `ALTER TABLE public.${CONFIG.TABLES.SETTLEMENTS} ENABLE ROW LEVEL SECURITY;\n\n`;
        sql += `-- 5. Indexes\n`;
        sql += `CREATE INDEX IF NOT EXISTS idx_${usersTable}_phone ON public.${usersTable}(phone);\n`;
        sql += `CREATE INDEX IF NOT EXISTS idx_${usersTable}_role ON public.${usersTable}(role);\n`;
        sql += `CREATE INDEX IF NOT EXISTS idx_${shipmentsTable}_status ON public.${shipmentsTable}("الحالة");\n`;
        sql += `CREATE INDEX IF NOT EXISTS idx_${shipmentsTable}_rep ON public.${shipmentsTable}("المندوب");\n`;
        sql += `CREATE INDEX IF NOT EXISTS idx_${shipmentsTable}_date ON public.${shipmentsTable}("التاريخ");\n`;
        return sql;
    }

    function updateSqlBlock() {
        document.getElementById('sqlBlock').textContent = generateSql();
    }

    function copySql() {
        var sql = generateSql();
        navigator.clipboard.writeText(sql).then(function() {
            Swal.fire({ icon: 'success', title: 'تم النسخ', text: 'تم نسخ استعلام SQL إلى الحافظة', timer: 1500, showConfirmButton: false });
        }).catch(function() {
            Swal.fire({ icon: 'warning', title: 'فشل النسخ', text: 'يرجى النسخ يدوياً' });
        });
    }

    function downloadSql() {
        var sql = generateSql();
        var blob = new Blob(['\uFEFF' + sql], { type: 'text/plain;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'light-shipping-schema.sql';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        Swal.fire({ icon: 'success', title: 'تم التحميل', text: 'تم تحميل ملف SQL', timer: 1500, showConfirmButton: false });
    }

    function saveSupabaseConfig() {
        try {
            var url = document.getElementById('supabaseUrl').value.trim();
            var key = document.getElementById('supabaseKey').value.trim();
            var ts = document.getElementById('tableShipments').value.trim();
            var tu = document.getElementById('tableUsers').value.trim();
            if (!url || !key) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'يرجى إدخال رابط Supabase والمفتاح' }); return; }
            if (!ts || !tu) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'يرجى إدخال أسماء الجداول' }); return; }
            localStorage.setItem('dev_supabase_url', _enc(url));
            localStorage.setItem('dev_supabase_key', _enc(key));
            localStorage.setItem('dev_table_shipments', _enc(ts));
            localStorage.setItem('dev_table_users', _enc(tu));
            CONFIG.SUPABASE_URL = url;
            CONFIG.SUPABASE_KEY = key;
            CONFIG.TABLES.SHIPMENTS = ts;
            CONFIG.TABLES.USERS = tu;
            updateSqlBlock();
            Swal.fire({ icon: 'success', title: 'تم الحفظ', text: 'تم حفظ إعدادات Supabase بنجاح', timer: 1500, showConfirmButton: false });
        } catch(e) {
            Swal.fire({ icon: 'error', title: 'خطأ', text: 'فشل حفظ الإعدادات: ' + e.message });
        }
    }

    function resetSupabaseConfig() {
        localStorage.removeItem('dev_supabase_url');
        localStorage.removeItem('dev_supabase_key');
        localStorage.removeItem('dev_table_shipments');
        localStorage.removeItem('dev_table_users');
        loadConfig();
        CONFIG.SUPABASE_URL = _d(_b64.URL);
        CONFIG.SUPABASE_KEY = _d(_b64.KEY);
        CONFIG.TABLES.SHIPMENTS = 'abdo';
        CONFIG.TABLES.USERS = 'users';
        updateSqlBlock();
        Swal.fire({ icon: 'success', title: 'تمت الاستعادة', text: 'تم استعادة الإعدادات الافتراضية', timer: 1500, showConfirmButton: false });
    }

    function toggleKey() {
        var el = document.getElementById('supabaseKey');
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function testConnection() {
        var url = document.getElementById('supabaseUrl').value.trim();
        var key = document.getElementById('supabaseKey').value.trim();
        var el = document.getElementById('connStatus');
        if (!url || !key) { el.innerHTML = '<span style="color:#ef4444">⚠️ يرجى إدخال الرابط والمفتاح أولاً</span>'; return; }
        el.innerHTML = '<span style="color:#60a5fa">⏳ جاري اختبار الاتصال...</span>';
        try {
            var client = window.supabase.createClient(url, key);
            var res = await client.from(document.getElementById('tableUsers').value.trim() || 'users').select('count', { count: 'exact', head: true });
            if (res.error) throw res.error;
            el.innerHTML = '<span style="color:#4ade80">✅ تم الاتصال بنجاح مع Supabase</span>';
            Swal.fire({ icon: 'success', title: 'اتصال ناجح', text: 'تم الاتصال بقاعدة البيانات بنجاح', timer: 2000, showConfirmButton: false });
        } catch(e) {
            el.innerHTML = '<span style="color:#ef4444">❌ فشل الاتصال: ' + e.message + '</span>';
            Swal.fire({ icon: 'error', title: 'فشل الاتصال', text: e.message });
        }
    }

    function saveDevCredentials() {
        try {
            var phone = document.getElementById('devPhone').value.trim();
            var pass = document.getElementById('devPass').value.trim();
            if (!phone || !pass) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'يرجى إدخال رقم المطور وكلمة المرور' }); return; }
            if (phone.length < 3 || pass.length < 3) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'يجب أن يكون رقم المطور وكلمة المرور 3 أحرف على الأقل' }); return; }
            localStorage.setItem('dev_phone', _enc(phone));
            localStorage.setItem('dev_pass', _enc(pass));
            DEV_PHONE = phone;
            DEV_PASS = pass;
            Swal.fire({ icon: 'success', title: 'تم الحفظ', text: 'تم حفظ بيانات دخول المطور', timer: 1500, showConfirmButton: false });
        } catch(e) {
            Swal.fire({ icon: 'error', title: 'خطأ', text: 'فشل حفظ البيانات: ' + e.message });
        }
    }

    function resetDevCredentials() {
        localStorage.removeItem('dev_phone');
        localStorage.removeItem('dev_pass');
        loadDevCredentials();
        DEV_PHONE = _dec('X19zdXBhX18wMTE0Mjk3Nzkw');
        DEV_PASS = _dec('X19zdXBhX18wMTQyOTc3Nzkw');
        Swal.fire({ icon: 'success', title: 'تمت الاستعادة', text: 'تم استعادة بيانات المطور الافتراضية', timer: 1500, showConfirmButton: false });
    }

    async function runSqlQuery() {
        var resultDiv = document.getElementById('queryResult');
        resultDiv.innerHTML = '<span style="color:#60a5fa">⏳ جاري تنفيذ الاستعلام...</span>';
        try {
            var url = document.getElementById('supabaseUrl').value.trim();
            var key = document.getElementById('supabaseKey').value.trim();
            if (!url || !key) { resultDiv.innerHTML = '<span style="color:#ef4444">⚠️ يرجى إدخال إعدادات Supabase أولاً</span>'; return; }
            var client = window.supabase.createClient(url, key);
            var shipmentsTable = document.getElementById('tableShipments').value.trim() || CONFIG.TABLES.SHIPMENTS;
            var usersTable = document.getElementById('tableUsers').value.trim() || CONFIG.TABLES.USERS;

            // Get table info
            var results = {};
            // Get shipments count
            var sRes = await client.from(shipmentsTable).select('count', { count: 'exact', head: true });
            if (sRes.error) throw new Error('جدول الشحنات: ' + sRes.error.message);
            results.shipments = sRes.count;

            var uRes = await client.from(usersTable).select('count', { count: 'exact', head: true });
            if (uRes.error) throw new Error('جدول المستخدمين: ' + uRes.error.message);
            results.users = uRes.count;

            var stRes;
            try {
                stRes = await client.from(CONFIG.TABLES.SETTLEMENTS).select('count', { count: 'exact', head: true });
                results.settlements = stRes.count || 0;
            } catch(e) {
                results.settlements = 'غير متاح';
            }

            // Sample data
            var sSample = await client.from(shipmentsTable).select('*').limit(3);
            var uSample = await client.from(usersTable).select('*').limit(3);

            var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem">';
            html += '<div class="glass" style="padding:1rem;text-align:center;background:rgba(59,130,246,.1)"><div style="font-size:2rem;font-weight:800;color:#60a5fa">' + results.shipments + '</div><div style="color:#94a3b8;font-size:.85rem;font-weight:600">📦 إجمالي الشحنات</div></div>';
            html += '<div class="glass" style="padding:1rem;text-align:center;background:rgba(34,197,94,.1)"><div style="font-size:2rem;font-weight:800;color:#4ade80">' + results.users + '</div><div style="color:#94a3b8;font-size:.85rem;font-weight:600">👤 إجمالي المستخدمين</div></div>';
            html += '<div class="glass" style="padding:1rem;text-align:center;background:rgba(168,85,247,.1)"><div style="font-size:2rem;font-weight:800;color:#a78bfa">' + results.settlements + '</div><div style="color:#94a3b8;font-size:.85rem;font-weight:600">💰 التسويات</div></div>';
            html += '</div>';

            html += '<div style="font-weight:700;margin-bottom:.5rem">📋 عينة من البيانات:</div>';
            if (sSample.data && sSample.data.length > 0) {
                html += '<div style="font-size:.8rem;margin-bottom:1rem"><span class="badge badge-blue">' + shipmentsTable + '</span><pre style="background:rgba(0,0,0,.2);padding:.75rem;border-radius:.5rem;margin-top:.3rem;overflow-x:auto;font-size:.75rem;direction:ltr;text-align:left">' + JSON.stringify(sSample.data, null, 2) + '</pre></div>';
            }
            if (uSample.data && uSample.data.length > 0) {
                html += '<div style="font-size:.8rem"><span class="badge badge-green">' + usersTable + '</span><pre style="background:rgba(0,0,0,.2);padding:.75rem;border-radius:.5rem;margin-top:.3rem;overflow-x:auto;font-size:.75rem;direction:ltr;text-align:left">' + JSON.stringify(uSample.data, null, 2) + '</pre></div>';
            }

            if (!sSample.data || sSample.data.length === 0) html += '<div style="color:#94a3b8">لا توجد بيانات في جدول الشحنات.</div>';

            resultDiv.innerHTML = html;
        } catch(e) {
            resultDiv.innerHTML = '<div style="color:#ef4444;font-weight:600">❌ خطأ: ' + e.message + '</div>';
        }
    }

    function devLogout() {
        Swal.fire({
            title: 'تسجيل الخروج؟',
            text: 'سيتم تسجيل خروجك من وضع المطور',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'نعم',
            cancelButtonText: 'إلغاء'
        }).then(function(r) {
            if (r.isConfirmed) {
                localStorage.removeItem('dev_logged_in');
                localStorage.removeItem('user');
                localStorage.removeItem('sessionToken');
                window.location.href = 'login.html';
            }
        });
    }

    loadConfig();
    loadDevCredentials();
    updateSqlBlock();
</script>
</body>
</html>
