    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var appRoutes = ["/admin", "/login", "/queries", "/sender"];
        var path = window.location.pathname.replace(/\/index\.html?$/i, "");
        var base = path;

        for (var i = 0; i < appRoutes.length; i += 1) {
          if (path.endsWith(appRoutes[i])) {
            base = path.slice(0, -appRoutes[i].length);
            break;
          }
        }

        base = base.replace(/\/$/i, "");
        window.NAGY_ROUTER_BASENAME = base || "";

        if (window.location.hash.indexOf("#/") === 0) {
          window.history.replaceState(null, "", (base || "") + window.location.hash.slice(1));
        }
      })();
    </script>
